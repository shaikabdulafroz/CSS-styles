<!DOCTYPE html>
<html>
<head>
    <title>Math Object Example</title>
</head>
<body>

<h2>Math Object Demo</h2>
<button onclick="mathDemo()">Click Me</button>

<p id="output"></p>

<script>
function mathDemo() {
    let num = 3;

    // Using Math properties and methods
    let piValue = Math.PI;
    let squareRoot = Math.sqrt(num);
    let power = Math.pow(2, 3);
    let randomNum = Math.random();
    let rounded = Math.round(4.6);

    document.getElementById("output").innerHTML =
        "PI Value: " + piValue + "<br>" +
        "Square Root of 3: " + squareRoot + "<br>" +
        "2 Power 3: " + power + "<br>" +
        "Random Number: " + randomNum + "<br>" +
        "Rounded Value of 4.6: " + rounded;
}
</script>

</body>
</html>
